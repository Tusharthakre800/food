version: '3.8'
services:
  frontend:
    build: ./frontend
    ports:
      - 3000:80

  backend:
    build: ./backend
    ports:
      - 5000:5000
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:1.19-alpine
    ports:
      - 80:80
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro